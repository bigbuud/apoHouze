name: Update Medicines Data

on:
  schedule:
    - cron: '0 3 * * 0'   # elke zondag 03:00 UTC
  workflow_dispatch:
    inputs:
      countries:
        description: 'Landen om te updaten (spatie-gescheiden)'
        required: false
        default: 'be nl de gb fr it us ca at ch dk es fi ie no pl pt se cz sk hr si hu ro gr lu'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python dependencies installeren
        run: pip install requests openpyxl

      - name: Node dependencies installeren
        run: npm install

      - name: Landen bepalen
        id: c
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "list=${{ github.event.inputs.countries }}" >> $GITHUB_OUTPUT
          else
            echo "list=be nl de gb fr it us ca at ch dk es fi ie no pl pt se cz sk hr si hu ro gr lu" >> $GITHUB_OUTPUT
          fi

      - name: Medicijnen updaten
        run: node update.js ${{ steps.c.outputs.list }}

      - name: Bijgewerkte data committen
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update medicines [skip ci]"
          file_pattern: "data/countries/*.js data/last-update.json"
          commit_user_name: "apoHouze Bot"
          commit_user_email: "bot@apohoux.local"
