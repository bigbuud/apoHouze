version: '3.8'

services:
  apohouze:
    image: ghcr.io/bigbuud/apohouze:latest
    container_name: apohouze
    restart: unless-stopped
    ports:
      - "3525:3000"
    volumes:
      - /volume1/docker/apohouze:/data
    environment:
      APP_USERNAME: admin
      APP_PASSWORD: apohouze123
      SESSION_SECRET: change-this-to-a-long-random-secret
      DB_PATH: /data/apohouze.db
      PORT: 3000
      NODE_ENV: production

      # ── Kies je landcode ──────────────────────────────────────────
      #
      # West-Europa
      # BE  🇧🇪  België          – FAMHP / afmps.be
      # NL  🇳🇱  Nederland       – CBG / geneesmiddeleninformatiebank.nl
      # DE  🇩🇪  Duitsland       – BfArM / gelbe-liste.de
      # FR  🇫🇷  Frankrijk       – ANSM / medicaments.gouv.fr
      # ES  🇪🇸  Spanje          – AEMPS / cima.aemps.es
      # IT  🇮🇹  Italië          – AIFA / farmaci.agenziafarmaco.it
      # CH  🇨🇭  Zwitserland     – Swissmedic / swissmedicinfo.ch
      # AT  🇦🇹  Oostenrijk      – BASG / ages.at
      # LU  🇱🇺  Luxemburg       – Ministère Santé / sante.public.lu
      #
      # Noord-Europa
      # GB  🇬🇧  Verenigd Koninkrijk – MHRA / bnf.nice.org.uk
      # IE  🇮🇪  Ierland         – HPRA / hpra.ie
      # DK  🇩🇰  Denemarken      – DKMA / produktresume.dk
      # NO  🇳🇴  Noorwegen       – NoMA / felleskatalogen.no
      # FI  🇫🇮  Finland         – Fimea / laakeinfo.fi
      # SE  🇸🇪  Zweden          – MPA / fass.se
      #
      # Oost-Europa
      # PL  🇵🇱  Polen           – URPL / rejestry.ezdrowie.gov.pl
      # CZ  🇨🇿  Tsjechië        – SÚKL / opendata.sukl.cz
      # SK  🇸🇰  Slowakije       – ŠÚKL / sukl.sk
      # HU  🇭🇺  Hongarije       – OGYÉI / ogyei.gov.hu
      # RO  🇷🇴  Roemenië        – ANMDMR / anm.ro
      # HR  🇭🇷  Kroatië         – HALMED / halmed.hr
      # SI  🇸🇮  Slovenië        – JAZMP / jazmp.si
      # GR  🇬🇷  Griekenland     – EOF / eof.gr
      # PT  🇵🇹  Portugal        – INFARMED / infarmed.pt
      #
      # Noord-Amerika
      # US  🇺🇸  Verenigde Staten – FDA NDC / open.fda.gov
      # CA  🇨🇦  Canada          – Health Canada DPD
      #
      COUNTRY: BE
